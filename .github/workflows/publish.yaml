
name: Docker Image Publish

on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for gh release edit in the annotation step
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.1.1
        with:
          cosign-release: 'v2.1.1'

      - name: Check install!
        if: github.event_name != 'pull_request'
        run: cosign version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2.1.0

      # Workaround: https://github.com/docker/build-push-action/issues/461
      - name: Setup Docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v2.5.0
      
      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # this is a simple way of using date and time to do versioning.
      - name: Modify scripts and get version
        id: version
        run: |
          output=$(date -u '+%Y%m%d%H%M%S')
          echo ::set-output name=date_version::$output

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      # When triggered by a semver tag (e.g. v1.2.3 from Release Please):
      #   - ghcr.io/…:1.2.3
      #   - ghcr.io/…:1.2
      #   - ghcr.io/…:1
      # When triggered by a push to main:
      #   - ghcr.io/…:sha-<sha>
      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v4.4.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long
       
      - name: downcase REPO
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and Push container images
        id: build-and-push
        uses: docker/build-push-action@v4.1.1
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }} # Don't push on PR
          labels: ${{ steps.docker_meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64 #,linux/arm/v7
          tags: |
            ${{ steps.docker_meta.outputs.tags }}
            ghcr.io/${{env.REPO}}:latest
            ghcr.io/${{env.REPO}}:${{steps.version.outputs.date_version}}
            
      # # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
      # - name: Sign image with a key
      #   if: github.event_name != 'pull_request'
      #   run: |
      #     cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${TAGS}@${DIGEST}"
      #   env:
      #     TAGS: ${{ steps.docker_meta.outputs.tags }}
      #     COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      #     COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      #     DIGEST: ${{ steps.build-and-push.outputs.digest }}

      # - name: Sign the images with GitHub OIDC Token
      #   if: github.event_name != 'pull_request'
      #   env:
      #     DIGEST: ${{ steps.build-and-push.outputs.digest }}
      #     TAGS: ${{ steps.docker_meta.outputs.tags }}
      #   run: cosign sign --yes "${TAGS}@${DIGEST}"

      # When triggered by a semver tag (v*.*.*), append Docker pull instructions
      # to the corresponding GitHub Release so users know which image to use.
      - name: Annotate GitHub Release with Docker image info
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_LC="${GITHUB_REPOSITORY,,}"
          MINOR="${VERSION%.*}"

          # Fetch existing release notes
          EXISTING=$(gh release view "v${VERSION}" --json body --jq '.body' 2>/dev/null || true)

          # Only append if Docker section not already present
          if echo "$EXISTING" | grep -q "## Docker Images"; then
            echo "Docker section already present, skipping."
            exit 0
          fi

          # Write the full updated notes to a temp file to avoid shell escaping issues
          {
            echo "$EXISTING"
            echo ""
            echo "## Docker Images"
            echo ""
            echo '```bash'
            echo "# Pinned to this release (recommended for production)"
            echo "docker pull ghcr.io/${REPO_LC}:${VERSION}"
            echo ""
            echo "# Latest patch of this minor version"
            echo "docker pull ghcr.io/${REPO_LC}:${MINOR}"
            echo ""
            echo "# Always latest release"
            echo "docker pull ghcr.io/${REPO_LC}:latest"
            echo '```'
            echo ""
            echo "| Tag | Meaning |"
            echo "|-----|---------|"
            echo "| \`${VERSION}\` | This exact release |"
            echo "| \`${MINOR}\` | Latest patch for this minor version |"
            echo "| \`latest\` | Most recent release |"
          } > /tmp/release-notes.md

          gh release edit "v${VERSION}" --notes-file /tmp/release-notes.md