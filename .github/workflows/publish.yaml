
name: Docker Image Publish

on:
  # PR validation: build only, no push.
  pull_request:
    branches: ["main"]
  # Push to main: builds and pushes latest/sha/date tags.
  push:
    branches: ["main"]
  # Called by release-please.yaml when a release is created.
  # Passes release_tag so semver Docker tags and release annotation are applied.
  # (A GITHUB_TOKEN-pushed tag cannot trigger workflows directly — this is the
  #  workaround for that GitHub Actions restriction.)
  workflow_call:
    inputs:
      release_tag:
        description: "Semver tag created by Release Please (e.g. v0.4.2)"
        required: false
        default: ""
        type: string

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for gh release edit in the annotation step
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # inputs context is only populated on workflow_call; safely empty on
          # push/pull_request, so the || github.sha fallback applies.
          ref: ${{ (inputs.release_tag != '' && inputs.release_tag) || github.sha }}

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Check cosign install
        if: github.event_name != 'pull_request'
        run: cosign version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get date version
        id: version
        run: echo "date_version=$(date -u '+%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      #
      # release path (workflow_call with release_tag input):
      #   type=semver with value= produces: 1.2.3 / 1.2 / 1
      # push-to-main path (release_tag empty):
      #   type=semver with empty value falls back to git ref — no semver tag on a
      #   branch ref, so these produce nothing. Only sha tag is generated here.
      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.release_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.release_tag }}
            type=semver,pattern={{major}},value=${{ inputs.release_tag }}
            type=sha,format=long
       
      - name: Downcase REPO
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and Push container images
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.docker_meta.outputs.tags }}
            ghcr.io/${{ env.REPO }}:latest
            ghcr.io/${{ env.REPO }}:${{ steps.version.outputs.date_version }}
            
      # # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
      # - name: Sign image with a key
      #   if: github.event_name != 'pull_request'
      #   run: |
      #     cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${TAGS}@${DIGEST}"
      #   env:
      #     TAGS: ${{ steps.docker_meta.outputs.tags }}
      #     COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      #     COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      #     DIGEST: ${{ steps.build-and-push.outputs.digest }}

      # - name: Sign the images with GitHub OIDC Token
      #   if: github.event_name != 'pull_request'
      #   env:
      #     DIGEST: ${{ steps.build-and-push.outputs.digest }}
      #     TAGS: ${{ steps.docker_meta.outputs.tags }}
      #   run: cosign sign --yes "${TAGS}@${DIGEST}"

      # Append Docker pull instructions to the GitHub Release body.
      # Only runs when called via workflow_call with a release_tag (release path).
      - name: Annotate GitHub Release with Docker image info
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          REPO_LC="${GITHUB_REPOSITORY,,}"
          MINOR="${VERSION%.*}"

          # Fetch existing release notes
          EXISTING=$(gh release view "v${VERSION}" --json body --jq '.body' 2>/dev/null || true)

          # Only append if Docker section not already present
          if echo "$EXISTING" | grep -q "## Docker Images"; then
            echo "Docker section already present, skipping."
            exit 0
          fi

          # Write the full updated notes to a temp file to avoid shell escaping issues
          {
            echo "$EXISTING"
            echo ""
            echo "## Docker Images"
            echo ""
            echo '```bash'
            echo "# Pinned to this release (recommended for production)"
            echo "docker pull ghcr.io/${REPO_LC}:${VERSION}"
            echo ""
            echo "# Latest patch of this minor version"
            echo "docker pull ghcr.io/${REPO_LC}:${MINOR}"
            echo ""
            echo "# Always latest release"
            echo "docker pull ghcr.io/${REPO_LC}:latest"
            echo '```'
            echo ""
            echo "| Tag | Meaning |"
            echo "|-----|---------|"
            echo "| \`${VERSION}\` | This exact release |"
            echo "| \`${MINOR}\` | Latest patch for this minor version |"
            echo "| \`latest\` | Most recent release |"
          } > /tmp/release-notes.md

          gh release edit "v${VERSION}" --notes-file /tmp/release-notes.md