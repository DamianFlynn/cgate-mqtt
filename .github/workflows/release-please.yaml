name: Release Please

# Runs after every push to main.
# Scans conventional commits since the last release and either:
#   - Opens / updates a "chore: release X.Y.Z" PR with an updated
#     package.json version and CHANGELOG.md, or
#   - If that PR was just merged, creates a GitHub Release + semver tag
#     (e.g. v0.5.0) and then calls the Docker publish workflow directly
#     (a GITHUB_TOKEN-pushed tag cannot trigger a separate workflow, so
#      publish is chained here via the release_created output).
on:
  push:
    branches:
      - main

permissions:
  contents: write       # needed to create releases and push version bump commits
  pull-requests: write  # needed to open the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Package path is "src", so release-please uses path-prefixed output keys.
      # Root-component keys (release_created / tag_name) are only set when path
      # is "." — using them here always yields an empty string.
      release_created: ${{ steps.release.outputs['src--release_created'] }}
      tag_name:        ${{ steps.release.outputs['src--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use manifest/config mode so Release Please respects the repo's manifest and config.
          command: manifest
          token: ${{ secrets.GITHUB_TOKEN }}

  # Chain the Docker publish directly when a release is created.
  # This is required because GITHUB_TOKEN-pushed tags do not trigger
  # downstream workflows (GitHub anti-recursion policy).
  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish.yaml
    with:
      release_tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
    permissions:
      contents: write   # gh release edit in the annotation step
      packages: write   # push to GHCR
      id-token: write   # cosign OIDC signing (if enabled)
